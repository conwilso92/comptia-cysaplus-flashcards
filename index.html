<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA CySA+ Flashcards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  .app { max-width: 700px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 1.4rem; text-align: center; margin-bottom: 4px; color: #f1f5f9; }
  .subtitle { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 24px; }
  .cat-bar { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .cat-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
  .cat-btn:hover { border-color: #60a5fa; color: #60a5fa; }
  .cat-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
  .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .progress-bar { flex: 1; height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 3px; transition: width 0.4s; }
  .progress-text { font-size: 0.8rem; color: #64748b; white-space: nowrap; }
  .card-container { perspective: 1000px; margin-bottom: 20px; }
  .card { position: relative; width: 100%; min-height: 220px; cursor: pointer; transition: transform 0.5s; transform-style: preserve-3d; }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 16px; padding: 32px 28px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .card-front { background: linear-gradient(145deg, #1e293b, #162032); border: 1px solid #334155; }
  .card-back { background: linear-gradient(145deg, #1a2744, #152238); border: 1px solid #2d4a6f; transform: rotateY(180deg); }
  .card-cat { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #60a5fa; margin-bottom: 16px; font-weight: 600; }
  .card-question { font-size: 1.15rem; line-height: 1.5; color: #f1f5f9; }
  .card-answer { font-size: 1.2rem; line-height: 1.6; color: #a5f3fc; font-weight: 600; }
  .card-answer .acr-full { display: block; font-size: 0.85rem; color: #7dd3fc; font-weight: 400; margin-top: 6px; }
  .card-hint { font-size: 0.75rem; color: #475569; margin-top: 20px; }
  .conf-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .conf-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .conf-btn:hover { transform: translateY(-1px); }
  .conf-miss { background: #7f1d1d; color: #fca5a5; }
  .conf-miss:hover { background: #991b1b; }
  .conf-shaky { background: #78350f; color: #fcd34d; }
  .conf-shaky:hover { background: #92400e; }
  .conf-got { background: #14532d; color: #86efac; }
  .conf-got:hover { background: #166534; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; }
  .nav-btn { padding: 10px 22px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .nav-btn:hover { background: #334155; color: #e2e8f0; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .shuffle-btn { padding: 10px 22px; border-radius: 10px; border: 1px solid #334155; background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.85rem; }
  .shuffle-btn:hover { border-color: #8b5cf6; color: #a78bfa; }
  .stats { display: flex; justify-content: center; gap: 24px; margin-top: 24px; padding: 16px; background: #1e293b; border-radius: 12px; }
  .stat { text-align: center; }
  .stat-num { font-size: 1.3rem; font-weight: 700; }
  .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .stat-miss .stat-num { color: #f87171; }
  .stat-shaky .stat-num { color: #fbbf24; }
  .stat-got .stat-num { color: #4ade80; }
  .stat-unseen .stat-num { color: #64748b; }
  .filter-mode { text-align: center; font-size: 0.78rem; color: #64748b; margin-bottom: 6px; }
  .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
  .empty-state p { margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CARDS = [

  // ========== DOMAIN 1: SECURITY OPERATIONS (33%) ==========

  // -- Architecture & Monitoring --
  { cat: "Security Operations", q: "What is a SIEM?", a: "SIEM<span class='acr-full'>(Security Information and Event Management — centralizes log collection, applies correlation rules, generates alerts and reports. Examples: Splunk, IBM QRadar, ELK Stack)</span>" },
  { cat: "Security Operations", q: "What is SOAR?", a: "SOAR<span class='acr-full'>(Security Orchestration, Automation, and Response — automates playbooks and integrates security tools via APIs to reduce MTTR)</span>" },
  { cat: "Security Operations", q: "What is EDR?", a: "EDR<span class='acr-full'>(Endpoint Detection and Response — agent-based endpoint monitoring focused on threat behavior patterns. Examples: CrowdStrike, Carbon Black)</span>" },
  { cat: "Security Operations", q: "What is XDR?", a: "XDR<span class='acr-full'>(Extended Detection and Response — extends EDR to network, cloud, email, and identity. Unified detection across the entire attack surface)</span>" },
  { cat: "Security Operations", q: "What is the key difference between EDR and XDR?", a: "EDR monitors endpoints only; XDR extends visibility to network, cloud, email, and identity data" },
  { cat: "Security Operations", q: "What is NetFlow / IPFIX?", a: "Network traffic metadata (src/dst IP, port, protocol, byte count) without capturing payload<span class='acr-full'>(Used to detect anomalies without full packet capture overhead)</span>" },
  { cat: "Security Operations", q: "What is the difference between active and passive monitoring?", a: "Active sends traffic to test the network; passive captures and analyzes traffic without adding to it" },
  { cat: "Security Operations", q: "What is a network TAP?", a: "Network Test Access Point — passively intercepts traffic for monitoring or analysis without disrupting the flow" },
  { cat: "Security Operations", q: "What is port mirroring/SPAN?", a: "Copying traffic from one switch port to another for monitoring<span class='acr-full'>(SPAN = Switched Port Analyzer)</span>" },
  { cat: "Security Operations", q: "What is DLP?", a: "DLP<span class='acr-full'>(Data Loss Prevention — monitors and blocks unauthorized data transfers. Network DLP inspects traffic; Endpoint DLP monitors local actions)</span>" },
  { cat: "Security Operations", q: "What is SSL/TLS inspection?", a: "Decrypting, inspecting, and re-encrypting TLS traffic to detect threats hidden in HTTPS<span class='acr-full'>(Requires installing the inspection device's CA cert on clients)</span>" },
  { cat: "Security Operations", q: "What is a honeypot?", a: "A decoy system designed to attract, detect, and study attackers" },
  { cat: "Security Operations", q: "What is a honeynet?", a: "A network of honeypots that simulates an entire environment to study attacker behavior" },
  { cat: "Security Operations", q: "What is a Zero Trust architecture?", a: "Never trust, always verify — every access request is authenticated regardless of network location" },
  { cat: "Security Operations", q: "What does CASB do?", a: "CASB<span class='acr-full'>(Cloud Access Security Broker — security control point between cloud users and services, enforcing policy)</span>" },

  // -- Malicious Activity & IoCs --
  { cat: "Security Operations", q: "What is beaconing?", a: "An infected host periodically communicating with a C2 server at regular intervals<span class='acr-full'>(C2 = Command and Control)</span>" },
  { cat: "Security Operations", q: "What is lateral movement?", a: "An attacker moving through a network after initial compromise to reach additional systems and data" },
  { cat: "Security Operations", q: "What is an IoC?", a: "IoC<span class='acr-full'>(Indicator of Compromise — artifacts or behaviors indicating a system has likely been breached: malicious IPs, file hashes, domain names, registry keys)</span>" },
  { cat: "Security Operations", q: "What registry keys are commonly used for persistence by malware?", a: "HKLM\\Software\\Microsoft\\Windows\\CurrentVersion\\Run and HKCU equivalent<span class='acr-full'>(Run keys execute on user login)</span>" },
  { cat: "Security Operations", q: "What is a DGA?", a: "DGA<span class='acr-full'>(Domain Generation Algorithm — malware technique generating many random domain names to make C2 infrastructure harder to block)</span>" },
  { cat: "Security Operations", q: "What is impossible travel?", a: "A login from two geographically distant locations within an impossible timeframe — strong indicator of account compromise" },
  { cat: "Security Operations", q: "What is data exfiltration?", a: "The unauthorized transfer of data from an organization to an external destination" },
  { cat: "Security Operations", q: "What does VirusTotal do?", a: "Submits files, hashes, or URLs for analysis by 70+ AV engines to identify malware" },
  { cat: "Security Operations", q: "What does a sandbox do?", a: "Executes suspicious files in an isolated, instrumented environment to safely observe behavior<span class='acr-full'>(Examples: Cuckoo, Joe Sandbox)</span>" },
  { cat: "Security Operations", q: "What is the Strings tool used for?", a: "Extracts readable text from binary files to reveal embedded URLs, file paths, and other indicators without executing the file" },

  // -- Email Security --
  { cat: "Security Operations", q: "What does SPF do?", a: "SPF<span class='acr-full'>(Sender Policy Framework — DNS record listing authorized mail servers for a domain, prevents MAIL FROM spoofing)</span>" },
  { cat: "Security Operations", q: "What does DKIM do?", a: "DKIM<span class='acr-full'>(DomainKeys Identified Mail — adds a cryptographic signature to email headers proving the domain sent it and it wasn't tampered with)</span>" },
  { cat: "Security Operations", q: "What does DMARC do?", a: "DMARC<span class='acr-full'>(Domain-based Message Authentication, Reporting and Conformance — uses SPF + DKIM and specifies what to do when they fail: none, quarantine, or reject)</span>" },
  { cat: "Security Operations", q: "What is the relationship between SPF, DKIM, and DMARC?", a: "SPF = authorized sending IPs. DKIM = cryptographic proof email is authentic. DMARC = policy for what to do when SPF or DKIM fail" },

  // -- Threat Intelligence --
  { cat: "Security Operations", q: "What are the three criteria for evaluating threat intelligence quality?", a: "Timeliness, Relevancy, Accuracy" },
  { cat: "Security Operations", q: "What are the five steps of the intelligence cycle?", a: "Requirements → Collection → Processing/Analysis → Dissemination → Feedback" },
  { cat: "Security Operations", q: "What is OSINT?", a: "OSINT<span class='acr-full'>(Open Source Intelligence — gathering threat data from publicly available sources)</span>" },
  { cat: "Security Operations", q: "What is an ISAC?", a: "ISAC<span class='acr-full'>(Information Sharing and Analysis Center — sector-specific organizations sharing threat intelligence among members)</span>" },
  { cat: "Security Operations", q: "What is STIX?", a: "STIX<span class='acr-full'>(Structured Threat Information eXpression — standardized language for describing cyber threat information)</span>" },
  { cat: "Security Operations", q: "What is TAXII?", a: "TAXII<span class='acr-full'>(Trusted Automated eXchange of Intelligence Information — protocol for transmitting STIX threat intelligence between organizations)</span>" },
  { cat: "Security Operations", q: "What is threat hunting?", a: "Proactively searching through networks and endpoints using hypotheses to find threats that evade automated detection" },
  { cat: "Security Operations", q: "What is the difference between strategic, tactical, and operational threat intelligence?", a: "Strategic = high-level trends for executives. Tactical = TTPs for security teams. Operational = specific attack details (IoCs) for immediate defense" },
  { cat: "Security Operations", q: "What are TTPs?", a: "TTPs<span class='acr-full'>(Tactics, Techniques, and Procedures — the behavior patterns attackers use, as documented in MITRE ATT&CK)</span>" },

  // -- Threat Actors --
  { cat: "Security Operations", q: "What is an APT?", a: "APT<span class='acr-full'>(Advanced Persistent Threat — sophisticated, long-duration attack typically backed by nation-states or organized crime)</span>" },
  { cat: "Security Operations", q: "What are the four main threat actor categories?", a: "Nation-state, Organized crime, Hacktivist, Insider threat" },
  { cat: "Security Operations", q: "What motivates a hacktivist?", a: "Political or social causes — they attack organizations to promote an agenda or expose wrongdoing" },
  { cat: "Security Operations", q: "What makes an insider threat uniquely dangerous?", a: "Authorized access, knowledge of systems and data locations, and often no perimeter to bypass" },

  // -- Recon & Scanning --
  { cat: "Security Operations", q: "What is the difference between passive and active reconnaissance?", a: "Passive uses publicly available info without touching the target; active directly interacts with the target (port scanning, OS fingerprinting)" },
  { cat: "Security Operations", q: "What is WHOIS used for?", a: "Querying domain registration, ownership, and contact information" },
  { cat: "Security Operations", q: "What does Nmap do?", a: "Port scanning and network discovery — identifies open ports, services, OS versions, and network topology" },
  { cat: "Security Operations", q: "What does Wireshark do?", a: "GUI packet analyzer — captures and deeply inspects network traffic; opens .pcap files" },
  { cat: "Security Operations", q: "What does tcpdump do?", a: "CLI packet capture on Linux; saves .pcap files for later Wireshark analysis" },

  // ========== DOMAIN 2: VULNERABILITY MANAGEMENT (30%) ==========

  // -- Program Design --
  { cat: "Vulnerability Management", q: "What are the six phases of the vulnerability management lifecycle?", a: "Asset Discovery → Scanning → Prioritization → Remediation → Verification → Reporting" },
  { cat: "Vulnerability Management", q: "What is the difference between a credentialed and non-credentialed scan?", a: "Credentialed logs into systems to find internal vulnerabilities; non-credentialed sees only what an external attacker would see" },
  { cat: "Vulnerability Management", q: "What is an agent-based vulnerability scan?", a: "Software agent installed on endpoints reports vulnerability data without needing network-based scanning" },
  { cat: "Vulnerability Management", q: "How often does PCI DSS require external vulnerability scans?", a: "Quarterly (and after any significant change)<span class='acr-full'>(External scans must use an Approved Scanning Vendor — ASV)</span>" },
  { cat: "Vulnerability Management", q: "What is special about scanning OT/ICS/SCADA systems?", a: "Aggressive scans can disrupt or physically damage these systems — use passive scanning or carefully configured safe-mode scans" },
  { cat: "Vulnerability Management", q: "What does FISMA require?", a: "FISMA<span class='acr-full'>(Federal Information Security Management Act — vulnerability scanning per NIST SP 800-53 for federal systems)</span>" },
  { cat: "Vulnerability Management", q: "What is a false positive in vulnerability scanning?", a: "Scanner reports a vulnerability that doesn't actually exist — wastes remediation resources" },
  { cat: "Vulnerability Management", q: "What is a false negative in vulnerability scanning?", a: "Scanner misses a real vulnerability — more dangerous than false positives because it creates a false sense of security" },
  { cat: "Vulnerability Management", q: "Why are credentialed scans preferred over non-credentialed scans?", a: "They reduce false positives and false negatives by authenticating to the system and checking internal configuration" },

  // -- CVSS --
  { cat: "Vulnerability Management", q: "What does CVSS stand for and what does it produce?", a: "CVSS<span class='acr-full'>(Common Vulnerability Scoring System — standardized 0–10 severity score for vulnerabilities)</span>" },
  { cat: "Vulnerability Management", q: "What CVSS score range is Critical?", a: "9.0–10.0" },
  { cat: "Vulnerability Management", q: "What CVSS score range is High?", a: "7.0–8.9" },
  { cat: "Vulnerability Management", q: "What CVSS score range is Medium?", a: "4.0–6.9" },
  { cat: "Vulnerability Management", q: "What CVSS metric measures how the attacker accesses the vulnerability?", a: "Attack Vector (AV)<span class='acr-full'>(Network = remotely exploitable = highest score. Also: Adjacent, Local, Physical)</span>" },
  { cat: "Vulnerability Management", q: "What CVSS metric shows whether the vulnerability requires user interaction?", a: "User Interaction (UI)<span class='acr-full'>(None = no user needed = higher score. Required = victim must take an action)</span>" },
  { cat: "Vulnerability Management", q: "What CVSS metric shows the authentication level required to exploit?", a: "Privileges Required (PR)<span class='acr-full'>(None = no auth needed = highest score)</span>" },
  { cat: "Vulnerability Management", q: "If the CVSS Impact sub-score is 0, what is the base score?", a: "0 — regardless of all other metrics" },
  { cat: "Vulnerability Management", q: "What is a CVE?", a: "CVE<span class='acr-full'>(Common Vulnerabilities and Exposures — standardized unique identifier for publicly known vulnerabilities)</span>" },
  { cat: "Vulnerability Management", q: "What is the CISA KEV catalog?", a: "CISA<span class='acr-full'>(Known Exploited Vulnerabilities catalog — lists vulnerabilities actively exploited in the wild; these must be prioritized regardless of CVSS score)</span>" },

  // -- Vulnerability Types --
  { cat: "Vulnerability Management", q: "What is a buffer overflow?", a: "Writing more data to a memory buffer than it can hold, potentially overwriting adjacent memory to execute arbitrary code" },
  { cat: "Vulnerability Management", q: "What is vertical privilege escalation?", a: "Gaining higher privileges than authorized — e.g., regular user gaining admin/root access" },
  { cat: "Vulnerability Management", q: "What is horizontal privilege escalation?", a: "Accessing another user's resources at the same privilege level — e.g., accessing another user's files" },
  { cat: "Vulnerability Management", q: "What is a zero-day vulnerability?", a: "A vulnerability with no available patch — organizations must rely on compensating controls until a patch is released" },
  { cat: "Vulnerability Management", q: "What is SQL injection?", a: "Injecting SQL commands into user input to manipulate the backend database<span class='acr-full'>(Prevented with parameterized queries/prepared statements)</span>" },
  { cat: "Vulnerability Management", q: "What is XSS?", a: "XSS<span class='acr-full'>(Cross-Site Scripting — injecting malicious scripts into web pages that execute in other users' browsers)</span>" },
  { cat: "Vulnerability Management", q: "What is CSRF?", a: "CSRF<span class='acr-full'>(Cross-Site Request Forgery — tricks authenticated users into submitting malicious requests)</span>" },
  { cat: "Vulnerability Management", q: "What is a race condition vulnerability?", a: "A flaw where the outcome depends on the sequence of events — exploitable when a check and action can be interrupted" },
  { cat: "Vulnerability Management", q: "What risk do end-of-life systems pose?", a: "No vendor patches — permanent unpatched vulnerabilities with no fix coming" },
  { cat: "Vulnerability Management", q: "What is a misconfiguration vulnerability?", a: "Systems configured insecurely: default credentials, unnecessary services, excessive permissions, open cloud storage buckets" },

  // -- Scanning Tools --
  { cat: "Vulnerability Management", q: "What is Nessus used for?", a: "Industry-leading vulnerability scanner — comprehensive plugin library, credentialed and non-credentialed scans<span class='acr-full'>(Tenable Nessus)</span>" },
  { cat: "Vulnerability Management", q: "What is OpenVAS?", a: "Free open-source vulnerability scanner — community-maintained plugin feed, integrated into Greenbone Vulnerability Manager" },
  { cat: "Vulnerability Management", q: "What is Qualys used for?", a: "Cloud-based vulnerability management platform — asset inventory, scanning, compliance assessment, dashboard reporting" },
  { cat: "Vulnerability Management", q: "What is Nikto used for?", a: "Open-source web application scanner — tests for SQL injection, XSS, and other web vulnerabilities" },
  { cat: "Vulnerability Management", q: "What is OWASP ZAP?", a: "OWASP ZAP<span class='acr-full'>(Zed Attack Proxy — free open-source web application security testing tool with active and passive scanning)</span>" },
  { cat: "Vulnerability Management", q: "What is Burp Suite used for?", a: "Professional web application security testing — intercepts HTTP/HTTPS traffic, active scanner, brute force, manual testing" },
  { cat: "Vulnerability Management", q: "What cloud security tools does the exam reference?", a: "Scout Suite (multi-cloud auditing), Prowler (AWS), Pacu (AWS exploitation framework)" },

  // -- Compliance Frameworks --
  { cat: "Vulnerability Management", q: "What does PCI DSS govern?", a: "PCI DSS<span class='acr-full'>(Payment Card Industry Data Security Standard — mandatory for merchants handling credit card data)</span>" },
  { cat: "Vulnerability Management", q: "What are CIS Benchmarks?", a: "CIS<span class='acr-full'>(Center for Internet Security — prescriptive hardening guidelines for specific systems used as security baselines)</span>" },
  { cat: "Vulnerability Management", q: "What is ISO 27001?", a: "International standard for Information Security Management Systems requiring third-party audit for certification<span class='acr-full'>(Part of the ISO 27000 series)</span>" },
  { cat: "Vulnerability Management", q: "What is the NIST Cybersecurity Framework?", a: "NIST CSF<span class='acr-full'>(Five functions: Identify, Protect, Detect, Respond, Recover — voluntary framework for managing cybersecurity risk)</span>" },
  { cat: "Vulnerability Management", q: "What is NIST SP 800-53?", a: "Security and privacy controls catalog for federal information systems — used for FISMA compliance" },
  { cat: "Vulnerability Management", q: "What is SOC 2?", a: "Auditing standard for service organizations covering Security, Availability, Processing Integrity, Confidentiality, and Privacy" },

  // -- Remediation --
  { cat: "Vulnerability Management", q: "What is the order of priority for applying patches?", a: "Critical/actively exploited vulnerabilities first → internet-facing systems → internal high-value systems → everything else" },
  { cat: "Vulnerability Management", q: "What is a compensating control?", a: "An alternative security measure used when the primary control cannot be implemented — must provide equivalent protection" },
  { cat: "Vulnerability Management", q: "What is vulnerability exception/risk acceptance?", a: "Formally documenting a decision to accept a vulnerability's risk rather than remediate it — requires management approval" },
  { cat: "Vulnerability Management", q: "What is patch management?", a: "The process of identifying, testing, and applying software updates to fix vulnerabilities and improve security" },
  { cat: "Vulnerability Management", q: "Why must patches be tested before production deployment?", a: "Patches can break applications or system functionality — testing in a dev/staging environment prevents production outages" },

  // ========== DOMAIN 3: INCIDENT RESPONSE & MANAGEMENT (20%) ==========

  // -- Attack Frameworks --
  { cat: "Incident Response", q: "What are the seven phases of the Cyber Kill Chain?", a: "Reconnaissance → Weaponization → Delivery → Exploitation → Installation → C2 → Actions on Objectives" },
  { cat: "Incident Response", q: "What is the MITRE ATT&CK framework?", a: "MITRE ATT&CK<span class='acr-full'>(Adversarial Tactics, Techniques & Common Knowledge — knowledge base of real-world adversary TTPs organized by tactic)</span>" },
  { cat: "Incident Response", q: "What is the Diamond Model of Intrusion Analysis?", a: "A framework analyzing intrusions through four components: Adversary, Capability, Infrastructure, Victim" },
  { cat: "Incident Response", q: "What does OSSTMM provide?", a: "OSSTMM<span class='acr-full'>(Open Source Security Testing Methodology Manual — standardized methodology for security testing)</span>" },

  // -- IR Lifecycle --
  { cat: "Incident Response", q: "What are the six NIST incident response phases?", a: "Preparation → Detection/Analysis → Containment → Eradication → Recovery → Post-Incident Activity" },
  { cat: "Incident Response", q: "What happens during IR Preparation?", a: "Develop IR plan, build CSIRT, create playbooks, conduct tabletop exercises, acquire tools, train staff, establish BC/DR" },
  { cat: "Incident Response", q: "What is a tabletop exercise?", a: "A discussion-based simulation of an incident — key personnel talk through a scenario without involving actual systems" },
  { cat: "Incident Response", q: "What is a playbook in incident response?", a: "Pre-written step-by-step procedures for a specific incident type (ransomware, phishing, data breach) — executed when that incident occurs" },
  { cat: "Incident Response", q: "What is CSIRT?", a: "CSIRT<span class='acr-full'>(Computer Security Incident Response Team — dedicated team responsible for coordinating incident response)</span>" },
  { cat: "Incident Response", q: "What is the difference between isolation and removal during containment?", a: "Isolation disconnects from network but keeps power (preserves volatile evidence); removal takes offline completely (destroys RAM)" },
  { cat: "Incident Response", q: "When is removal preferred over isolation?", a: "When isolation is insufficient to stop spread or forensic analysis is complete" },
  { cat: "Incident Response", q: "What is eradication?", a: "Removing the root cause — malware, backdoors, unauthorized accounts — and patching exploited vulnerabilities" },
  { cat: "Incident Response", q: "Why is scope assessment critical before containment?", a: "Containing before understanding full scope may leave backdoors in place, allowing the attacker to return" },
  { cat: "Incident Response", q: "What is the first priority when active ransomware is detected?", a: "Containment — immediately disconnect the infected system from the network to prevent spread" },

  // -- Evidence & Forensics --
  { cat: "Incident Response", q: "What is the order of volatility in digital forensics?", a: "CPU/RAM → Network connections → Running processes → Disk/Storage → Local logs → Remote logs → Physical config" },
  { cat: "Incident Response", q: "Why must evidence be collected in order of volatility?", a: "Volatile evidence (RAM, network state) is permanently lost when power is removed — it must be captured first" },
  { cat: "Incident Response", q: "What is chain of custody?", a: "Documentation tracking every person who handled evidence, when, and how — required to make evidence admissible in court" },
  { cat: "Incident Response", q: "What is a legal hold?", a: "A directive to preserve all relevant data in anticipation of legal proceedings — overrides normal data retention/deletion policies" },
  { cat: "Incident Response", q: "What is a write blocker?", a: "Hardware or software that prevents any writes to the original evidence drive during forensic imaging" },
  { cat: "Incident Response", q: "How is forensic data integrity verified?", a: "Cryptographic hashing — hash the original, document the value, re-hash after imaging and compare (SHA-256 preferred)" },
  { cat: "Incident Response", q: "What is the dd command used for in forensics?", a: "Creates a bit-for-bit disk image: dd if=/dev/sda of=disk.img<span class='acr-full'>(dcfldd adds built-in hashing)</span>" },
  { cat: "Incident Response", q: "What is Autopsy used for?", a: "Open-source digital forensics platform — file carving, keyword search, timeline analysis, artifact extraction" },
  { cat: "Incident Response", q: "What is Volatility used for?", a: "Memory forensics framework — analyzes RAM dumps to extract running processes, network connections, encryption keys" },
  { cat: "Incident Response", q: "What does FTK stand for?", a: "FTK<span class='acr-full'>(Forensic Toolkit — commercial forensic suite for evidence analysis, keyword search, and reporting)</span>" },
  { cat: "Incident Response", q: "What tools are in the NIST forensic toolkit?", a: "Forensic workstation, forensic software, write blockers, drive duplicators, wiped media, cables/adapters, camera, evidence labels, notebooks" },

  // -- Post-Incident --
  { cat: "Incident Response", q: "What is root cause analysis?", a: "The process of identifying what happened, why, and what underlying condition enabled the incident — drives preventive remediation" },
  { cat: "Incident Response", q: "What are the four steps of root cause analysis?", a: "Identify events → Establish timeline → Differentiate root causes from contributing factors → Document RCA" },
  { cat: "Incident Response", q: "What is the purpose of a lessons learned meeting?", a: "Structured blameless review of the IR process to identify improvements — results in updates to IR plan, playbooks, and controls" },

  // ========== DOMAIN 4: REPORTING & COMMUNICATION (17%) ==========

  // -- Metrics & KPIs --
  { cat: "Reporting & Communication", q: "What is MTTD?", a: "MTTD<span class='acr-full'>(Mean Time to Detect — average time from incident occurrence to when it was detected. High MTTD indicates detection gaps)</span>" },
  { cat: "Reporting & Communication", q: "What is MTTR?", a: "MTTR<span class='acr-full'>(Mean Time to Respond — time from detection to activating the IR process. Also used for Mean Time to Remediate in some contexts)</span>" },
  { cat: "Reporting & Communication", q: "What does alert fatigue mean?", a: "Too many alerts overwhelm analysts, causing real incidents to be missed — address by tuning rules and reducing false positives" },
  { cat: "Reporting & Communication", q: "What vulnerability metrics should be tracked over time?", a: "Trends (improving or worsening), top 10 by risk, critical/zero-day count, SLO compliance for remediation timeframes" },
  { cat: "Reporting & Communication", q: "What is a SLO in vulnerability management?", a: "SLO<span class='acr-full'>(Service Level Objective — agreed timeframe within which vulnerabilities of each severity must be remediated)</span>" },

  // -- Regulatory Breach Notification --
  { cat: "Reporting & Communication", q: "What is GDPR's breach notification requirement?", a: "72 hours to notify the supervisory authority after discovering a breach<span class='acr-full'>(General Data Protection Regulation — EU)</span>" },
  { cat: "Reporting & Communication", q: "What is HIPAA's breach notification requirement?", a: "60 days to notify affected individuals and HHS after discovering a breach<span class='acr-full'>(Health Insurance Portability and Accountability Act)</span>" },
  { cat: "Reporting & Communication", q: "What does PCI DSS require after a breach?", a: "Immediately notify the card brands and acquiring bank" },
  { cat: "Reporting & Communication", q: "When should legal counsel be involved in an incident?", a: "Data breach with notification requirements, potential litigation, law enforcement involvement, or regulatory reporting" },
  { cat: "Reporting & Communication", q: "Why should public statements be coordinated with legal before release?", a: "Premature or inaccurate statements can worsen damage, create legal liability, and undermine trust" },

  // -- Audience & Format --
  { cat: "Reporting & Communication", q: "What should an executive-level incident report contain?", a: "Business impact, summary of what happened, what was done to respond, status, and what is being done to prevent recurrence — minimal technical jargon" },
  { cat: "Reporting & Communication", q: "What should a technical incident report contain?", a: "Full timeline, technical IoCs and TTPs used, affected systems, forensic findings, detailed remediation steps, and evidence" },
  { cat: "Reporting & Communication", q: "What is a vulnerability report used for?", a: "Communicating vulnerability findings, severity, risk context, remediation recommendations, and remediation SLO compliance to stakeholders" },
  { cat: "Reporting & Communication", q: "What stakeholders may need breach notification?", a: "Executives, legal, HR, affected business units, regulators, customers, law enforcement, cyber insurance carrier, public" },

  // ========== ADDITIONAL INCIDENT RESPONSE ==========
  { cat: "Incident Response", q: "What are the seven stages of the Cyber Kill Chain in order?", a: "Reconnaissance, Weaponization, Delivery, Exploitation, Installation, C2, Actions on Objectives" },
  { cat: "Incident Response", q: "What stage of the Kill Chain involves crafting the exploit?", a: "Weaponization — packaging the exploit and payload into a deliverable weapon" },
  { cat: "Incident Response", q: "What stage of the Kill Chain is the attacker communicating with the compromised system?", a: "Command and Control (C2)" },
  { cat: "Incident Response", q: "What is the Diamond Model of Intrusion Analysis?", a: "Analyzes intrusions across four linked features: Adversary, Capability, Infrastructure, Victim" },
  { cat: "Incident Response", q: "What does the Diamond Model help analysts do?", a: "Pivot between intrusion features to uncover related campaigns, infrastructure, and adversary attribution" },
  { cat: "Incident Response", q: "What is OSSTMM?", a: "OSSTMM<span class='acr-full'>(Open Source Security Testing Methodology Manual — peer-reviewed methodology for security testing)</span>" },
  { cat: "Incident Response", q: "What is OWASP Testing Guide used for?", a: "Standardized methodology for web application security testing — documents specific test cases for each vulnerability type" },
  { cat: "Incident Response", q: "What is a CSIRT?", a: "CSIRT<span class='acr-full'>(Computer Security Incident Response Team — dedicated team coordinating all phases of incident response)</span>" },
  { cat: "Incident Response", q: "What is BC/DR and why does it relate to IR preparation?", a: "Business Continuity and Disaster Recovery planning ensures critical operations continue during major incidents — IR and BC/DR must be aligned" },
  { cat: "Incident Response", q: "What is the difference between short-term and long-term containment?", a: "Short-term = immediate isolation to stop spread. Long-term = patching and rebuilding to safely restore operations" },
  { cat: "Incident Response", q: "What are compensating controls in the context of containment?", a: "Temporary additional security measures deployed when permanent fixes cannot be immediately applied" },
  { cat: "Incident Response", q: "Why does NIST caution against prioritizing attacker attribution during active incidents?", a: "Attribution is time-consuming and often futile — it distracts from the primary goal of minimizing business impact" },
  { cat: "Incident Response", q: "What is re-imaging in eradication?", a: "Wiping and rebuilding compromised systems from a known-good baseline to ensure all malware and backdoors are removed" },
  { cat: "Incident Response", q: "What should be monitored closely during recovery?", a: "Signs of re-infection or attacker re-entry — watch logs, alerts, and network traffic for indicators of persistence" },
  { cat: "Incident Response", q: "What tool is used to acquire RAM for forensic analysis?", a: "WinPmem (Windows) or LiME (Linux)<span class='acr-full'>(Creates a memory dump file for analysis with Volatility)</span>" },
  { cat: "Incident Response", q: "What is dcfldd?", a: "A forensic-enhanced version of dd with built-in hashing to verify integrity during imaging" },
  { cat: "Incident Response", q: "What is EnCase?", a: "A commercial digital forensics platform for evidence acquisition, analysis, and reporting used in legal proceedings" },
  { cat: "Incident Response", q: "What is a forensic drive duplicator?", a: "Specialized hardware creating verified bit-for-bit copies of storage media independently without a computer" },
  { cat: "Incident Response", q: "Why should forensic analysis always be performed on a copy, not the original?", a: "Working on the original evidence risks altering it, destroying its integrity, and making it inadmissible in court" },
  { cat: "Incident Response", q: "What network commands capture volatile evidence during an investigation?", a: "netstat (connections), arp -a (ARP cache), route (routing table) — all must be captured before shutdown" },
  { cat: "Incident Response", q: "What is log correlation in incident analysis?", a: "Connecting events across multiple log sources to identify patterns and reconstruct an attack timeline" },
  { cat: "Incident Response", q: "Why is NTP critical during incident response?", a: "Synchronized clocks across all systems are essential for accurate log correlation and timeline reconstruction" },
  { cat: "Incident Response", q: "What is meant by 'scope' in incident detection?", a: "Determining which systems were affected, what data may have been accessed, and how far the attacker moved" },
  { cat: "Incident Response", q: "What is impact assessment during containment?", a: "Evaluating the business impact of both the incident and the proposed containment actions before executing them" },

  // ========== ADDITIONAL REPORTING & COMMUNICATION ==========
  { cat: "Reporting & Communication", q: "What is the difference between MTTD and MTTR?", a: "MTTD = time from incident to detection. MTTR = time from detection to response activation (or time to remediate)" },
  { cat: "Reporting & Communication", q: "What does a high MTTD indicate?", a: "Detection gaps — attackers are dwelling in the environment undetected for too long" },
  { cat: "Reporting & Communication", q: "What is the purpose of a final incident report?", a: "Documents the full incident timeline, findings, business impact, response actions, and recommendations to prevent recurrence" },
  { cat: "Reporting & Communication", q: "What is inhibitors to remediation in vulnerability reporting?", a: "Documenting reasons vulnerabilities cannot be immediately patched: MOUs, SLAs, proprietary systems, business constraints" },
  { cat: "Reporting & Communication", q: "What is an MOU in the context of vulnerability management?", a: "MOU<span class='acr-full'>(Memorandum of Understanding — agreement with a third party that may limit an organization's ability to patch shared systems)</span>" },
  { cat: "Reporting & Communication", q: "What is the purpose of tracking remediation SLO compliance?", a: "Ensures vulnerabilities are fixed within agreed timeframes and identifies when teams are falling behind" },
  { cat: "Reporting & Communication", q: "What is action-oriented reporting?", a: "Reports that clearly state what decision or action is needed from the recipient, not just what was found" },

];

let deck = [...CARDS];
let idx = 0;
let flipped = false;
let filter = "All";
let scores = {};

function getFiltered() {
  if (filter === "All") return [...CARDS];
  if (filter === "Missed") return CARDS.filter(c => scores[c.q] === "miss");
  if (filter === "Shaky") return CARDS.filter(c => scores[c.q] === "shaky");
  return CARDS.filter(c => c.cat === filter);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function doShuffle() { deck = shuffle(getFiltered()); idx = 0; flipped = false; render(); }
function setFilter(f) { filter = f; deck = getFiltered(); idx = 0; flipped = false; render(); }
function flipCard() { flipped = !flipped; render(); }
function prev() { if (idx > 0) { idx--; flipped = false; render(); } }
function next() { if (idx < deck.length - 1) { idx++; flipped = false; render(); } }

function score(level) {
  if (deck.length === 0) return;
  scores[deck[idx].q] = level;
  if (idx < deck.length - 1) { idx++; flipped = false; }
  render();
}

function getStats() {
  let miss = 0, shaky = 0, got = 0, unseen = 0;
  CARDS.forEach(c => {
    const s = scores[c.q];
    if (s === "miss") miss++; else if (s === "shaky") shaky++; else if (s === "got") got++; else unseen++;
  });
  return { miss, shaky, got, unseen };
}

const cats = ["All", ...new Set(CARDS.map(c => c.cat)), "Missed", "Shaky"];

function render() {
  const app = document.getElementById("app");
  const stats = getStats();
  const total = deck.length;
  const progress = total > 0 ? ((idx + 1) / total * 100) : 0;
  const card = deck[idx];

  let catBtns = cats.map(c =>
    `<button class="cat-btn ${filter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}${c === "Missed" ? ` (${stats.miss})` : c === "Shaky" ? ` (${stats.shaky})` : ''}</button>`
  ).join('');

  let cardHTML = '';
  if (!card) {
    cardHTML = `<div class="empty-state"><p>No cards in this category yet.</p><p>Study more and mark cards to see them here!</p></div>`;
  } else {
    cardHTML = `
      <div class="card-container">
        <div class="card ${flipped ? 'flipped' : ''}" onclick="flipCard()">
          <div class="card-face card-front">
            <div class="card-cat">${card.cat}</div>
            <div class="card-question">${card.q}</div>
            <div class="card-hint">tap to reveal</div>
          </div>
          <div class="card-face card-back">
            <div class="card-cat">Answer</div>
            <div class="card-answer">${card.a}</div>
          </div>
        </div>
      </div>
      <div class="conf-row">
        <button class="conf-btn conf-miss" onclick="score('miss')">Missed</button>
        <button class="conf-btn conf-shaky" onclick="score('shaky')">Shaky</button>
        <button class="conf-btn conf-got" onclick="score('got')">Got it</button>
      </div>`;
  }

  app.innerHTML = `
    <h1>CySA+ Flashcards</h1>
    <div class="subtitle">CS0-003 · ${CARDS.length} cards · one question, one answer</div>
    <div class="cat-bar">${catBtns}</div>
    ${total > 0 ? `
    <div class="filter-mode">${filter !== "All" && filter !== "Missed" && filter !== "Shaky" ? filter + ' · ' : ''}${idx + 1} of ${total}</div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="progress-text">${Math.round(progress)}%</div>
    </div>` : ''}
    ${cardHTML}
    ${card ? `
    <div class="nav-row">
      <button class="nav-btn" onclick="prev()" ${idx === 0 ? 'disabled' : ''}>← Prev</button>
      <button class="shuffle-btn" onclick="doShuffle()">Shuffle</button>
      <button class="nav-btn" onclick="next()" ${idx >= total - 1 ? 'disabled' : ''}>Next →</button>
    </div>` : ''}
    <div class="stats">
      <div class="stat stat-miss"><div class="stat-num">${stats.miss}</div><div class="stat-label">Missed</div></div>
      <div class="stat stat-shaky"><div class="stat-num">${stats.shaky}</div><div class="stat-label">Shaky</div></div>
      <div class="stat stat-got"><div class="stat-num">${stats.got}</div><div class="stat-label">Got It</div></div>
      <div class="stat stat-unseen"><div class="stat-num">${stats.unseen}</div><div class="stat-label">Unseen</div></div>
    </div>`;
}

doShuffle();
</script>
